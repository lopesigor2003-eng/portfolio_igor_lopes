      function ProjectPage({ project, onBack, phone }) {
        const [images, setImages] = useState([]);
        const [videos, setVideos] = useState([]);
        const [newImageUrl, setNewImageUrl] = useState('');
        const [newVideoTitle, setNewVideoTitle] = useState('');
        const [newVideoUrl, setNewVideoUrl] = useState('');
        const [newVideoDesc, setNewVideoDesc] = useState('');
        const [showMediaForm, setShowMediaForm] = useState(false);

        const [activeIndex, setActiveIndex] = useState(0);
        const [activeVideoIndex, setActiveVideoIndex] = useState(0);
        const [copied, setCopied] = useState(false);
        const [manualCount, setManualCount] = useState(0);
        const [authorActiveIndex, setAuthorActiveIndex] = useState(0);
        const [zoomImage, setZoomImage] = useState(null);

        useEffect(() => {
          setImages(project.images || []);
          setVideos(project.videos || []);
          setActiveIndex(0);
          setActiveVideoIndex(0);
          setManualCount(0);
          setAuthorActiveIndex(0);
          setShowMediaForm(false);
          setZoomImage(null);
          window.scrollTo({ top: 0, behavior: 'instant' });
        }, [project]);

        // Safe clamped index to prevent rendering out-of-bounds array items during project transitions
        const safeActiveIndex = activeIndex < images.length ? activeIndex : 0;
        const currentImage = images[safeActiveIndex] || '';

        // Auto slideshow every 10 seconds
        useEffect(() => {
          if (images.length <= 1) return;
          const interval = setInterval(() => {
            setActiveIndex((prev) => (prev + 1) % images.length);
          }, 10000);
          return () => clearInterval(interval);
        }, [images.length, manualCount]);

        const handleSelectImage = (idx) => {
          setActiveIndex(idx);
          setManualCount(prev => prev + 1);
        };

        const handleAddImage = (e) => {
          e.preventDefault();
          if (!newImageUrl.trim()) return;
          setImages(prev => [...prev, newImageUrl.trim()]);
          setNewImageUrl('');
        };

        const handleAddVideo = (e) => {
          e.preventDefault();
          if (!newVideoTitle.trim() || !newVideoUrl.trim()) return;
          const newVid = {
            title: newVideoTitle.trim(),
            url: newVideoUrl.trim(),
            desc: newVideoDesc.trim() || 'vídeos produzidos durante o trabalho na comunicação social'
          };
          setVideos(prev => {
            const updated = [...prev, newVid];
            setActiveVideoIndex(updated.length - 1);
            return updated;
          });
          setNewVideoTitle('');
          setNewVideoUrl('');
          setNewVideoDesc('');
        };

        const copyLink = async () => {
          const slug = getSlug(project.name);
          const fullUrl = `${window.location.origin}${window.location.pathname}#/projeto/${slug}`;
          
          let success = false;
          try {
            await navigator.clipboard.writeText(fullUrl);
            success = true;
          } catch (err) {
            try {
              const textArea = document.createElement("textarea");
              textArea.value = fullUrl;

                      {

                          {/* Left side: Interactive Video player */}

                            <div className="relative aspect-video rounded-2xl overflow-hidden bg-black border border-white/10 group-hover:border-indigo-500/30 transition-all shadow-2xl">

                                className="absolute inset-0 w-full h-full border-0"
                                allow="autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen"

                            </div>
                          </div>

                            <div className="space-y-1">
                              <div className="flex flex-wrap gap-2 items-center">
                                <span className="font-mono text-[9px] font-bold text-indigo-400 bg-indigo-500/10 border border-indigo-500/20 px-2 py-0.5 rounded uppercase tracking-wider">
                                  Projeto {index + 1}

                              <p className="font-mono text-[10px] text-slate-400 uppercase tracking-widest font-semibold mb-2">Características Principais:</p>

                                {site.features.map(f => (
                                  <span key={f} className="font-sans text-[10px] text-slate-300 bg-white/5 border border-white/10 rounded-full px-2.5 py-0.5">

              {/* Dynamic Video Section if project has videos */}
              {videos && videos.length > 0 && (
                <div className="mt-16 pt-12 border-t border-white/10 space-y-8 text-left">
                  <div className="text-center md:text-left space-y-1">
                    <h3 className="font-display font-extrabold text-2xl sm:text-3xl text-white tracking-tight flex items-center justify-center md:justify-start gap-2.5">
                      <span className="p-1 px-2.5 bg-cyan-500/10 border border-cyan-500/20 text-[10px] font-bold uppercase tracking-wider text-cyan-300 rounded">Produção Audiovisual</span>

                          const activeVid = videos[activeVideoIndex] || videos[0];
                          if (!activeVid) return null;
                          const isDrive = activeVid.url && activeVid.url.includes('drive.google.com');
                          let embedUrl = activeVid.url;
                          if (isDrive) {
                            const match = activeVid.url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                            if (match && match[1]) {
                              embedUrl = `https://drive.google.com/file/d/${match[1]}/preview`;
                            }
                          }

                          return isDrive ? (
                            <iframe
                              src={embedUrl}
                              className="absolute inset-0 w-full h-full border-0 rounded-2xl"
                              allow="autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                              allowFullScreen
                              referrerPolicy="no-referrer"
                              key={`${activeVideoIndex}-${activeVid.url}`}
                            />
                          ) : (
                            <video
                              src={activeVid.url}
                              className="absolute inset-0 w-full h-full object-cover rounded-2xl"
                              controls
                              playsInline
                              preload="metadata"
                              key={`${activeVideoIndex}-${activeVid.url}`}
                            />
                          );
                        })()}
                      </div>

                      {/* Left/Right controls inside card */}
                      {videos.length > 1 && (
                        <>
                          <button
                            onClick={() => setActiveVideoIndex(prev => (prev - 1 + videos.length) % videos.length)}
                            aria-label="Vídeo anterior"
                            className="absolute left-[-16px] top-1/2 -translate-y-1/2 z-10 p-2.5 rounded-full bg-slate-955/95 text-white hover:bg-cyan-500 hover:text-slate-950 border border-white/10 shadow-lg hover:shadow-cyan-500/10 cursor-pointer transition-all active:scale-95"
                          >
                            <Icon name="ChevronLeft" className="h-5 w-5" />
                          </button>
                          <button
                            onClick={() => setActiveVideoIndex(prev => (prev + 1) % videos.length)}
                            aria-label="Próximo vídeo"
                            className="absolute right-[-16px] top-1/2 -translate-y-1/2 z-10 p-2.5 rounded-full bg-slate-955/95 text-white hover:bg-cyan-500 hover:text-slate-950 border border-white/10 shadow-lg hover:shadow-cyan-500/10 cursor-pointer transition-all active:scale-95"
                          >
                            <Icon name="ChevronRight" className="h-5 w-5" />
                          </button>
                        </>
                      )}
                    </div>

                    {/* Active Video Info Card */}
                    {videos[activeVideoIndex] && (
                      <div className="px-2 text-center transition-all duration-300">
                        <span className="inline-block font-mono text-[10px] text-cyan-400 font-semibold tracking-wider uppercase px-2.5 py-0.5 bg-cyan-500/10 rounded-full border border-cyan-500/20">
                          Vídeo {activeVideoIndex + 1} de {videos.length}
                        </span>
                      </div>
                    )}

                    {/* Carousel Indicator Dots */}
                    {videos.length > 1 && (
                      <div className="flex flex-wrap justify-center gap-2">
                        {videos.map((vid, idx) => (
                          <button
                            key={idx}
                            onClick={() => setActiveVideoIndex(idx)}
                            className={`h-2.5 rounded-full transition-all duration-300 ${
                              idx === activeVideoIndex 
                                ? 'w-8 bg-cyan-400 shadow-[0_0_8px_rgba(34,211,238,0.4)]' 
                                : 'w-2.5 bg-slate-700 hover:bg-slate-500'
                            }`}
                            title={vid.title}
                          />
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              )}



              {/* Zoom Modal Lightbox */}
              {zoomImage && (
                <div 
                  className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-md cursor-zoom-out transition-all duration-300 animate-fade-in"

                >
                  <div className="relative max-w-5xl max-h-[90vh] w-full flex flex-col items-center justify-center" onClick={(e) => e.stopPropagation()}>

                      className="absolute -top-12 right-0 p-2 text-white/70 hover:text-white hover:bg-white/10 rounded-full transition-all text-xs font-mono uppercase tracking-wider flex items-center gap-1 cursor-pointer"

                      <span>Fechar</span> ✕

                      src={zoomImage}

                    <p className="mt-4 font-sans text-xs text-slate-400 font-light text-center">
                      Toque ou clique em qualquer lugar fora da imagem para fechar
                    </p>
                  </div>
                </div>
              )}
            </main>
          </div>
        );

      function Footer({ name }) {
        const currentYear = new Date().getFullYear();

        const scrollToTop = () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        return (
          <footer className="bg-[#020617] border-t border-white/10 py-12 relative z-10 select-none">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="md:flex md:items-center md:justify-between space-y-6 md:space-y-0">
                
                <div className="text-left md:text-left space-y-1.5 flex flex-col">
                  <p className="font-display font-semibold text-sm text-white">
                    {name} • Designer Gráfico
                  </p>
                  <p className="font-sans text-xs text-slate-500">
                    © {currentYear} Todos os direitos reservados. Conectado via Frosted Glass Theme.

                  <span className="font-mono text-[9px] text-slate-500 tracking-wider uppercase font-bold">

                    <span>Voltar ao topo</span>
                    <Icon name="ArrowUp" className="h-3 w-3" />
                  </button>
                </div>

              </div>
            </div>
          </footer>
        );
      }

      // Component: App Root Controller
      function App() {
        const [activeProject, setActiveProject] = useState(null);
        const [scrollPosition, setScrollPosition] = useState(0);

        // Sync Hash Location links for direct page shares
        useEffect(() => {
          const handleHashChange = () => {
            const hash = window.location.hash;
            if (hash.startsWith('#/projeto/')) {
              const slug = hash.replace('#/projeto/', '');
              const found = PORTFOLIO_DB.projects.find(p => getSlug(p.name) === slug);
              if (found) {
                setActiveProject(found);
                return;
              }
            }
            setActiveProject(null);
          };

          handleHashChange();
          window.addEventListener('hashchange', handleHashChange);
          return () => window.removeEventListener('hashchange', handleHashChange);
        }, []);

        useEffect(() => {
          document.body.style.overflow = 'auto';
          document.documentElement.style.overflow = 'auto';
        }, []);

        useEffect(() => {
          if (!activeProject) {
            if (scrollPosition > 0) {
              const t = setTimeout(() => {
                window.scrollTo({ top: scrollPosition, behavior: 'instant' });
              }, 30);
              return () => clearTimeout(t);
            }
          } else {
            window.scrollTo(0, 0);
          }
        }, [activeProject, scrollPosition]);

        const handleProjectSelect = (project) => {
          if (project) {
            setScrollPosition(window.scrollY);
            const slug = getSlug(project.name);
            window.location.hash = `#/projeto/${slug}`;
          } else {
            window.location.hash = '';
          }
        };

        const handleBackToHome = () => {
          window.location.hash = '';
        };

        const militaryProject = PORTFOLIO_DB.projects.find(p => p.category === 'military');

        return (
          <div className="bg-[#020617] min-h-screen text-slate-100 font-sans selection:bg-indigo-500/20 selection:text-indigo-400 overflow-x-hidden antialiased">
            {/* Header section overlay bar layout */}
            <Header
              email={PORTFOLIO_DB.bio.email}
              phone={PORTFOLIO_DB.bio.phone}
            />

            {activeProject ? (
              /* Custom dynamic Project page visualization sub-screen panel details */
              <div className="pt-24 min-h-[calc(100vh-200px)]">
                <ProjectPage
                  project={activeProject}
                  onBack={handleBackToHome}
                  phone={PORTFOLIO_DB.bio.phone}
                />
                <ContactSection
                  email={PORTFOLIO_DB.bio.email}
                  phone={PORTFOLIO_DB.bio.phone}
                  bioParagraphs={PORTFOLIO_DB.bio.bioParagraphs}
                />
              </div>
            ) : (
              /* Main Single page flow cards listing visual items */
              <>
                <Hero
                  tagline={PORTFOLIO_DB.bio.tagline}
                  subtagline={PORTFOLIO_DB.bio.subtagline}
                  avatar={PORTFOLIO_DB.bio.avatar}
                  phone={PORTFOLIO_DB.bio.phone}
                />

                <PortfolioGrid
                  projects={PORTFOLIO_DB.projects}
                  onProjectSelect={handleProjectSelect}
                />

                <MilitaryShowcase
                  militaryData={militaryProject}
                />

                <ContactSection
                  email={PORTFOLIO_DB.bio.email}
                  phone={PORTFOLIO_DB.bio.phone}
                  bioParagraphs={PORTFOLIO_DB.bio.bioParagraphs}
                />
              </>
            )}

            <Footer
              name={PORTFOLIO_DB.bio.name}
            />

            {/* Universal WhatsApp Floating Action Button */}
            <a
              href={`https://wa.me/${PORTFOLIO_DB.bio.phone.replace(/[^0-9]/g, '')}`}
              target="_blank"
              rel="noreferrer"
              className="fixed bottom-6 right-6 z-50 flex items-center justify-center p-4 bg-gradient-to-r from-emerald-500 to-green-600 rounded-full shadow-2xl shadow-emerald-500/30 hover:scale-110 active:scale-95 transition-all duration-300 group cursor-pointer"
              title="Fale conosco no WhatsApp"
            >
              <span className="absolute right-full mr-3 px-3 py-1.5 rounded-xl bg-slate-950/90 border border-white/10 text-white text-[11px] font-bold uppercase tracking-wider backdrop-blur select-none pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap shadow-xl">
                Falar com Igor
              </span>
              <svg className="h-6 w-6 text-white shrink-0 fill-current" viewBox="0 0 24 24">
                <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.5-5.739-1.446L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.63-1.023-5.101-2.885-6.965C16.428 1.975 13.96 1.95 11.48 1.95c-5.442 0-9.866 4.372-9.87 9.802 0 1.737.463 3.435 1.34 4.947l-.997 3.64 3.735-.979a9.782 9.782 0 0 0 4.359 1.035zm11.144-7.534c-.312-.156-1.85-.912-2.138-1.016-.288-.103-.497-.156-.705.156-.208.312-.806 1.016-.988 1.223-.182.208-.364.234-.676.078-1.03-.519-1.748-.966-2.441-2.152-.178-.314.178-.291.51-.956.11-.223.056-.417-.028-.574-.084-.156-.705-1.7-.965-2.327-.254-.614-.51-.53-.705-.54-.182-.01-.39-.012-.598-.012s-.546.078-.832.39c-.286.313-1.093 1.069-1.093 2.607 0 1.538 1.118 3.023 1.274 3.23.156.208 2.19 3.34 5.306 4.69.742.32 1.32.51 1.77.653.746.237 1.425.203 1.962.124.598-.088 1.85-.756 2.11-1.449.26-.693.26-1.288.182-1.41-.078-.122-.288-.195-.6-.352z"/>
              </svg>
              <span className="absolute -top-1 -right-1 flex h-3.5 w-3.5">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span className="relative inline-flex rounded-full h-3.5 w-3.5 bg-emerald-500 border-2 border-slate-900"></span>
              </span>
            </a>
          </div>
        );
      }

      // 4. RENDER TO CLIENT COMPONENT CONTAINER WINDOWS
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
